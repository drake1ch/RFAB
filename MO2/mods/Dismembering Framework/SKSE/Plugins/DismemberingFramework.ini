; Dismembering Framework - Developper Settings
; WARNING: The parameters in this file are intended for advanced users. These are advanced features that you probably do not want to modify.

[General]
# This parameter determines the verbosity level used by the framework for logging and communication.
# Levels of verbosity:
#    0: Only errors will be logged.
#    1: Standard information will be logged.
#    2: Advanced logging will be enabled.
iVerboseMode = 1

# When enabled, this parameter allows the framework's resources to be loaded asynchronously, preventing any delay in the game's startup.
bAsynchronousStartup = 1

# Delays dismemberment processing by one frame to confirm if the hit actually resulted in the actor's death.
bDeferredHitProcess = 1

# This parameter skips dependency checks during component loading when set to 1.
bShouldIgnoreMaintenanceChecks = 0

# This setting enables Debug mode, allowing various features of the mod to be automatically activated, overriding settings configured through the MCM.
# If this resolves any issue, it may indicate FormID corruption caused by changes in the load order on existing playthrough.
#    0: Debug mode is disabled.
#    1: Forces dismemberment for NPCs and creatures. This can be useful if dismemberment does not trigger correctly during a fatal hit. You still need to configure weapons.
#    2: Enables the majority of the framework's core features.
iDebugMode = 0