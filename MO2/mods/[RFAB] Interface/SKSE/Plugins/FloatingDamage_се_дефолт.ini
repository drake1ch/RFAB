[Font]
; default - $EverywhereMediumFont
Name=$EverywhereMediumFont
Size=24
Alpha=100
BlockSize=24
SneakSize=24
CriticalSize=24

[String]
SingleDamageFront=
SingleDamageBack=
TimeDamageFront=
TimeDamageBack=
BlockString=BLOCK
SneakString=SNEAK
CriticalString=CRITICAL
HealthHealFront=
HealthHealBack=
MagickaDamageFront=
MagickaDamageBack=
MagickaHealFront=
MagickaHealBack=
StaminaDamageFront=
StaminaDamageBack=
StaminaHealFront=
StaminaHealBack=

[Color]
HostileSingleDamage=0xFFFFFF
HostileTimeDamage=0xFFD700
FollowerSingleDamage=0xFF0000
FollowerTimeDamage=0x800080
Block=0xFF8C00
Sneak=0xFF8C00
Critical=0xFF8C00
HealthHeal=0x00FF00
MagickaDamage=0x0000FF
MagickaHeal=0xFF00FF
StaminaDamage=0x008000
StaminaHeal=0x00FFFF

[FirstPerson]
EnablePlayer=true
; Set PositionX and PositionY to values between 0 and 100
PositionX=50
PositionY=75

[Behavior]
; Set DamageDisplayMode and HealDisplayMode to values between 0 and 4
; 0 - Default
; 1 - Freeze
; 2 - Accelerate
; 3 - Bound
; 4 - Drop
DamageDisplayMode=0
HealDisplayMode=0
DisplayDispersion=2
TimeDamageDifference=3
TimeDamageInterval=60
MinHeal=8
HideRegen=true
HideNoLOS=false
; Set EnableBlock, EnableSneak and EnableCritical to values between 0 and 3
; 0 - Disable
; 1 - Display text "BLOCK", "SNEAK" and "CRITICAL"
; 2 - Change text size and color (Sometimes not function properly)
; 3 - Display text "BLOCK", "SNEAK" and "CRITICAL" + Change text size and color (Sometimes not function properly)
EnableBlock=1
EnableSneak=1
EnableCritical=1
; Set EnableHealth, EnableMagicka and EnableStamina to values between 0 and 3
; 0 - Disable
; 1 - Display damage numbers
; 2 - Display healing numbers
; 3 - Display damage numbers + Display healing numbers
EnableHealth=3
EnableMagicka=0
EnableStamina=0

[NearActors]
OnlyHostile=false
NearRadius=7000
FarRadius=8000
ListUpdateTime=100
