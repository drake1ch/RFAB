nexusDescription="[color=#A4B7FF][size=5][font=Bebas_Neuebook]Scrambled Bugs[/font][/size][/color]\n<br />[b]Fixes[/b]\n<br />[list][*][b]Actor Value Percentage[/b] (default: [color=#00ff00]enabled[/color])\n<br />Temporary actor value modifiers are not accounted for when calculating the percentage of an actor value.\n<br />[spoiler]The GetActorValuePercent, GetHealthPercentage, and GetStaminaPercentage conditions and the GetActorValuePercentage Papyrus function account for permanent but not temporary actor value modifiers. This is also true of the enemy health bar displayed in the HUD. They will therefore be incorrect if the target has any temporary buffs or debuffs to the relevant actor value.[/spoiler]\n<br />[*][b]Apply Spell Perk Entry Points: Arrows[/b] (default: [color=#00ff00]enabled[/color])\n<br />The kill camera simulates the trajectory of an arrow when it is fired and runs the Apply Combat Hit Spell perk entry point if it will hit a non-player character.\n<br />[spoiler]If you have the [url=https://en.uesp.net/wiki/Skyrim:Archery]Bullseye[/url] perk and the kill camera is enabled then targets will be paralyzed when the kill camera starts, otherwise if the kill camera is disabled then targets will be paralyzed when the kill camera would have started.[/spoiler]\n<br />[*][b]Harvested Flags[/b] (default: [color=#00ff00]enabled[/color])\n<br />Flora and trees are saved when they are harvested, but not when they respawn. If you save and reload, any flora and trees in the loaded area that have respawned will be harvested once again. This is an alternative to the [url=https://www.nexusmods.com/skyrimspecialedition/mods/13186]Flora Respawn Fix[/url]\xfeff.\n<br />[spoiler][center][img]https://staticdelivery.nexusmods.com/mods/1704/images/43532/43532-1617782127-1617579807.gif[/img][/center]\n<br />The image above demonstrates what you can expect to happen when you save and reload. Flora and trees that were previously harvested and had since respawned will once again be harvested.[/spoiler]\n<br />[*][b]Hit Effect Race Condition[/b] (default: [color=#00ff00]enabled[/color])\n<br />A [url=https://en.wikipedia.org/wiki/Race_condition]race condition[/url] will prevent hit effects from being applied to an actor if their mesh loads after a magic effect is first updated.\n<br />[spoiler]The most common example of this bug is magic effects with the [url=https://www.creationkit.com/index.php?title=Magic_Effect#Flags]Recover[/url] flag that apply hit effects. If the actors mesh is loaded before the magic effect is first updated then any hit effects will be applied. However, if the actors mesh is instead loaded after the magic effect is first updated then any hit effects will not be applied.[/spoiler]\n<br />[*][b]Magic Effect Conditions[/b] (default: [color=#00ff00]enabled[/color])\n<br />Floating-point error will gradually prevent the conditions of magic effects from being updated. The longer a magic effect has been running for, the more frequently this will occur ([url=https://www.nexusmods.com/skyrim/articles/52587]article[/url]\xfeff). This is an alternative to the ability condition fix in [url=https://www.nexusmods.com/skyrimspecialedition/mods/33261]Bug Fixes SSE[/url].\n<br />[spoiler][center][img]https://staticdelivery.nexusmods.com/mods/1704/images/43532/43532-1617358163-3111596.jpeg[/img][/center]\n<br />The image above demonstrates a magic effect that has been running for well over a year. Without the fix, its conditions will never be updated. With the fix, its conditions will always be updated. Updates generally begin to be skipped after the magic effect has been running for approximately three days.[/spoiler]\n<br />[*][b]Magic Effect Flags[/b] (default: [color=#00ff00]enabled[/color])\n<br />Magic effects do not respect their flags when scaling their duration and magnitude.\n<br />[spoiler]With this fix the flags of a magic effect are respected when scaling its duration and magnitude with its effectiveness. If Power Affects Duration is flagged then the duration of the magic effect will be scaled with its effectiveness, unless No Duration is also flagged. If Power Affects Magnitude is flagged then the magnitude of the magic effect will be scaled with its effectiveness, unless No Magnitude is also flagged.[/spoiler]\n<br />[*][b]Mod Armor Weight Perk Entry Point[/b] (default: [color=#00ff00]enabled[/color])\n<br />Instead of the Mod Armor Weight perk entry point modifying the weight of just the armor you are wearing, the weight of stacks of that armor is modified. ([url=https://www.nexusmods.com/skyrim/articles/52605]article[/url]).\n<br />[spoiler]If you are familiar with [url=https://elderscrolls.fandom.com/wiki/The_Steed_Stone_(Skyrim)]The Steed Stone[/url]\xa0or the [url=https://elderscrolls.fandom.com/wiki/Heavy_Armor_(Skyrim)#Conditioning]Conditioning[/url] and [url=https://elderscrolls.fandom.com/wiki/Unhindered]Unhindered[/url] perks then you will have encountered this before.[/spoiler]\n<br />[*][b]Quick Shot[/b] (default: [color=#00ff00]enabled[/color])\n<br />The Quick Shot perk is not accounted for when calculating the power of an arrow fired by the player.\n<br />[spoiler]The bPerkQuickDraw animation variable allows the player to nock the arrow 2 times as fast. However, the base game does not account for this and therefore incorrectly calculates the power of an arrow fired by the player if you have the Quick Shot perk. If you have a mod installed that changes the playback speed of the nocking animation when the bPerkQuickDraw animation variable is set, the same change will have to be made to the settings file.[/spoiler]\n<br />[*][b]Terrain Decals[/b] (default: [color=#00ff00]enabled[/color])\n<br />Decals cannot be applied to the terrain in cells that have been partially unloaded. Decals are use to create effects such as blood, footprints, and magic impacts.\n<br />[spoiler][center][img]https://staticdelivery.nexusmods.com/mods/1704/images/43532/43532-1617498453-1927054388.jpeg[/img][/center][/spoiler]\n<br />[*][b]Training Menu Text[/b] (default: [color=#00ff00]enabled[/color])\n<br />The cost of a lesson displayed in the training menu is affected by any buffs or debuffs to the relevant skill.\n<br />[spoiler][center][img]https://staticdelivery.nexusmods.com/mods/1704/images/43532/43532-1617358845-1647034197.gif[/img][/center][/spoiler]\n<br />[*][b]Weapon Charge[/b] (default: [color=#00ff00]enabled[/color])\n<br />The charge of equipped enchanted weapons can only be restored to their charge when they were last equipped or recharged.\n<br />[spoiler]With this fix the charge of equipped enchanted weapons can always be fully restored.[/spoiler][/list][b]Patches[/b]\n<br />[list][*][b]Accumulating Magnitude[/b] (default: [color=#ff0000]disabled[/color])\n<br />The maximum magnitude of an accumulating magnitude magic effect scales with its effectiveness instead of the rate of accumulation.\n<br />[spoiler]The base game scales the rate of accumulation of an accumulating magnitude magic effect with its effectiveness. For example wards will charge 2.2 times as fast if they are dual casted. With this patch wards will instead have 2.2 times the maximum power if they are dual casted. The effectiveness of a magic effect is affected by dual casting, perk entry points, and resistances.[/spoiler]\n<br />[*][b]Already Caught Pickpocketing[/b] (default: [color=#ff0000]disabled[/color])\n<br />Pickpocket non-player characters even if you have already been caught.\n<br />[spoiler]You can be caught pickpocketing for a variety of reasons and left unable to pickpocket a non-player character until they reload, even if you are undetected. With this patch you are always able to pickpocket non-player characters even if they have already caught you.[/spoiler]\n<br />[*][b]Apply Spell Perk Entry Points: Cast Spells[/b] (default: [color=#00ff00]enabled[/color])\n<br />Spells applied by perk entry points are cast by the source on the target, instead of by the target on the target.\n<br />[spoiler]With this patch the spell will use the sources perks, conditions will be run on the source, and events will be sent the source. Ability, addiction and disease spells will still be added to the target as in the base game. The following perk entry points are affected:\n<br />[list][*]Apply Bashing Spell\n<br />[*]Apply Combat Hit Spell\n<br />[*]Apply Reanimate Spell\n<br />[*]Apply Weapon Swing Spell[/list][/spoiler]\n<br />[*][b]Apply Spell Perk Entry Points: Multiple Spells[/b] (default: [color=#ff0000]disabled[/color])\n<br />Apply any number of spells at once using perk entry points, instead of only one spell.\n<br />[spoiler]The apply spell perk entry points are unique and powerful tools, however they must be used sparingly because only one spell can be applied under any given set of conditions. With this patch any number of spells can be applied under any given set of conditions. The following perk entry points are affected:\n<br />[list][*]Apply Bashing Spell\n<br />[*]Apply Combat Hit Spell\n<br />[*]Apply Reanimate Spell\n<br />[*]Apply Sneaking Spell\n<br />[*]Apply Weapon Swing Spell[/list][/spoiler]\n<br />[*][b]Attach Hit Effect Art[/b] (default: [color=#ff0000]disabled[/color])\n<br />Attach hit effect art to actors each time they load, instead of only when a spell is first applied.\n<br />[spoiler]The base game will only attach hit effect art when an actor gains an ability from an alias, or when they are first hit by a spell. This limits the types of spells that can attach hit effect art, and the ways in which those spells can be applied. If an actor unloads and reloads or transforms into a werewolf then the hit effect art is not reattached. With this patch hit effect art are always reattached like hit shaders.[/spoiler]\n<br />[*][b]Equip Best Ammo[/b] (default: [color=#ff0000]disabled[/color])\n<br />Automatically equip your best arrows or bolts when you equip a bow or crossbow, instead of your worst arrows or bolts.\n<br />[*][b]Lockpicking Experience[/b] (default: [color=#00ff00]enabled[/color])\n<br />Earn experience every time you pick a lock instead of only the first time.\n<br />[*][b]Multiple Hit Effects[/b] (default: [color=#ff0000]disabled[/color])\n<br />Each of a cloaking spells magic effects can apply hit effects, instead of only the costliest magic effect.\n<br />[spoiler]Cloaking spells provide a performance friendly and compatible method to apply hit effects to actors. However, because only the costliest magic effect can apply hit effects, you must create a separate cloaking spell for each of the hit effects you intend to apply. This means that if you intend to apply different hit effects under different conditions, you must create a separate cloaking spell for each set of conditions. With this patch you only require a single cloaking spell.[/spoiler]\n<br />[*][b]Paused Game Hit Effects[/b] (default: [color=#00ff00]enabled[/color])\n<br />Apply any number of hit effects to the player while the game is paused, instead of only one hit effect.\n<br />[spoiler]Without this patch it is only possible to apply one hit effect to the player while the game is paused. This is a problem if you want to apply a hit effect to the player while a menu is open. For example if you equip armor that attaches a hit effect while the inventory menu is open, you cannot apply another hit effect until the inventory menu is closed.[/spoiler]\n<br />[*][b]Power Attack Stamina[/b] (default: [color=#ff0000]disabled[/color])\n<br />Both the player and non-player characters can only perform power attacks and bashes with the required stamina.\n<br />[spoiler]The base game requires that you have greater than 0 stamina to perform power attacks and bashes. With this patch you are required to have the full amount of stamina to perform power attacks and bashes. If power attacks are chained then stamina is only required for the first power attack. Power attacks can for example be chained when dual wielding.[/spoiler]\n<br />[*][b]Reflect Damage[/b] (default: [color=#00ff00]enabled[/color])\n<br />Reflect any amount of damage, instead of only up to 100% damage.\n<br />[*][b]Teammate Difficulty[/b] (default: [color=#ff0000]disabled[/color])\n<br />Followers (not summoned creatures) use the same difficulty multipliers as the player. This is an alternative to [url=https://www.nexusmods.com/skyrimspecialedition/mods/35767]Difficulty Balance[/url].\n<br />[spoiler]The base game multiplies damage depending on whether the target is the player. For example on master difficulty the player takes 2 times damage while non-player characters take 0.5 times damage. This means that followers both take and deal 0.5 damage on master difficulty. With this patch follower instead take 2 times damage and deal 0.5 damage on master difficulty, just like the player.[/spoiler]\n<br />[*][b]Underfilled Soul Gems[/b] (default: [color=#ff0000]disabled[/color])\n<br />Trap only souls of the appropriate size in soul gems. There is an optional file to reflect this change in the notification displayed when you fail to capture a soul.\n<br />[spoiler][center][img]https://staticdelivery.nexusmods.com/mods/1704/images/43532/43532-1616786740-1183182670.jpeg[/img][/center]\n<br />For a more fully featured mod please see:\n<br />[list][*][url=https://www.nexusmods.com/skyrimspecialedition/mods/15755/]GIST - Genuinely Intelligent Soul Trap[/url]\xfeff[/list][/spoiler][/list]\n<br />[color=#A4B7FF][size=5][font=Bebas_Neuebook]Scrambled Eggchantments[/font][/size][/color]\n<br />[b]Fixes[/b]\n<br />[list][*][b]Enchantment Cost[/b] (default: [color=#00ff00]enabled[/color])\n<br />The value of player enchanted items and the amount of charge that player enchanted weapons drain is not saved ([url=https://www.nexusmods.com/skyrimspecialedition/articles/2980]article[/url]).\xa0This is an alternative to the [url=https://www.nexusmods.com/skyrimspecialedition/mods/21055]Enchantment Reload Fix[/url].\n<br />[spoiler][center][img]https://staticdelivery.nexusmods.com/mods/1704/images/43532/43532-1618329267-1738198016.gif[/img][/center][/spoiler][/list][b]Patches[/b]\n<br />[list][*][b]Enchantment Value[/b] (default: [color=#ff0000]disabled[/color])\n<br />The value of an enchantment is calculated using the default cost of the enchantment, instead of the overridden cost of the enchantment. Player created enchantments are therefore valued in the same way as existing enchantments, and so their value will increase as your skill in enchanting increases.\n<br />[spoiler]In the base game the value of player created enchantments decreases as your skill in enchanting increases. This happens because both the value of enchantments and the charge that weapon enchantments drain depend on the \"cost\" of the enchantment. The cost of player created enchantments decreases as your skill in enchanting increases to reduce the charge that weapon enchantments drain. Consequently the value of the enchantment is decreased. With this patch player created enchantments are valued using their default cost, which depends on their power. You can therefore expect the value of your enchantments to increase as your skill in enchanting increases. Existing enchantments are already valued in this way.[/spoiler]\n<br />[*][b]Multiple Enchantment Effects[/b] (default: [color=#00ff00]enabled[/color])\n<br />Your skill in enchanting improves each of an enchantments effects, instead of only the costliest effect. This affects enchantments with multiple effects such as [url=https://elderscrolls.fandom.com/wiki/Chaos_Damage]Chaos Damage[/url]\xfeff and [url=https://elderscrolls.fandom.com/wiki/Fiery_Soul_Trap]Fiery Soul Trap[/url]\xfeff.\n<br />[spoiler][center][img]https://staticdelivery.nexusmods.com/mods/1704/images/43532/43532-1617781325-1592588141.gif[/img][/center]\n<br />The imagine above demonstrates that both of an enchantments effects are increased by your skill in enchanting, instead of only the costliest effect.[/spoiler][/list]\n<br />[color=#A4B7FF][size=5][font=Bebas_Neuebook]Compatibility[/font][/size][/color]\n<br />[b]Fixes[/b]\n<br />[list][*][b]Magic Effect Conditions[/b]\n<br />This is an alternative to the ability condition fix in [url=https://www.nexusmods.com/skyrimspecialedition/mods/33261]Bug Fixes SSE[/url]. Scrambled Bugs uses individual local timers to update the conditions of each magic effect that are reset when the elapsed time of the magic effect is reset. Bug Fixes SSE instead uses a single global timer to update the conditions of all magic effects. Both mods can be installed at the same time, but the magic effect conditions fix in Scrambled Bugs will be silently disabled if the ability condition fix in Bug Fixes SSE is enabled.[/list]\n<br />[b]Patches[/b]\n<br />[list][*][b]Apply Spell Perk Entry Points: Multiple Spells[/b]\n<br />Perk overhauls may be designed with the limitation of only one spell being applied at once in mind. Without this patch both the conditions and priority of a perk entry point will be used to determine which spell is applied. With this patch only the conditions of a perk entry point will be used to determine which spells are applied. Perk entry points may therefore apply spells that are not intended by the mod author. The following perk overhauls are compatible from the specified version onwards, or with the specified patch:\n<br />[list][*][url=https://www.nexusmods.com/skyrimspecialedition/mods/30191]Adamant[/url] (Version 5.1+)\n<br />[*][url=https://www.nexusmods.com/skyrimspecialedition/mods/1137]Ordinator[/url] ([url=https://www.nexusmods.com/skyrimspecialedition/mods/51965/]Patch[/url])\n<br />[*][url=https://www.nexusmods.com/skyrimspecialedition/mods/26176]Vokrii[/url] ([url=https://www.nexusmods.com/skyrimspecialedition/mods/52631/]Patch[/url])[/list]\n<br />[*][b]Attach Hit Effect Art[/b]\n<br />Some magic effects try to attach the wrong hit effect art, and without this patch they are unable to. The only example of this in the base game is a flame trail that is attached to Storm Atronachs. Such bugs can only be fixed in the [url=https://www.creationkit.com/index.php?title=Category:Getting_Started]Creation Kit[/url] by mods such as the [url=https://www.nexusmods.com/skyrimspecialedition/mods/266/]Unofficial Skyrim Special Edition Patch[/url].\n<br />[*][b]Multiple Hit Effects[/b]\n<br />Cloaking spells may be designed with the limitation of only the costliest effect applying hit effects in mind. Only one membrane shader can generally be applied to an actor at once. With this patch a cloaking spell may instead apply multiple membrane shaders. The only example of this in the base game is the [url=https://elderscrolls.fandom.com/wiki/Frost_Cloak_(Skyrim)]Frost Cloak[/url] spell when the caster has the [url=https://elderscrolls.fandom.com/wiki/Destruction_(Skyrim)]Deep Freeze[/url] perk and the target is below 20% health. The target will transition between two membrane shaders when they are first hit under these conditions.[/list]\n<br />\n<br />[color=#A4B7FF][size=5][font=Bebas_Neuebook]Settings[/font][/size][/color]\n<br />The fixes and patches can be individually enabled or disabled in the settings files, which can be opened in any text editor. The settings files can be found in the following folders:\n<br />\n<br />[b]Scrambled Bugs[/b]\n<br />[list][*]Data&#92;DLLPlugins&#92;ScrambledBugs.json[/list]\n<br />[b]Scrambled Eggchantments[/b]\n<br />[list][*]Data&#92;SKSE&#92;Plugins&#92;ScrambledEggchantments.json[/list]\n<br />Scrambled Bugs will log your settings to [i]Data&#92;DLLPlugins&#92;ScrambledBugs.log[/i] both before and after it is initialized. If a setting you have enabled conflicts with another mod you have installed it will be logged and silently disabled.\n<br />\n<br />\n<br />[color=#A4B7FF][size=5][font=Bebas_Neuebook]Requirements[/font][/size][/color]\n<br />[b]Scrambled Bugs[/b]\n<br />[list][*][url=https://dotnet.microsoft.com/download/dotnet/5.0/runtime].NET 5.0 Runtime[/url]\n<br />[*]Pick only one: [url=https://www.nexusmods.com/skyrimspecialedition/mods/17230]SSE Engine Fixes SKSE64 Preloader[/url] or [url=https://www.nexusmods.com/skyrimspecialedition/mods/10546]DLL Plugin Loader[/url]\n<br />[*][url=https://www.nexusmods.com/skyrimspecialedition/mods/32444]Address Library for SKSE Plugins[/url][/list]\n<br />[b]Scrambled Eggchantments[/b]\n<br />[list][*][url=https://www.nexusmods.com/skyrimspecialedition/mods/30379]SKSE64[/url]\xfeff\n<br />[*][url=https://www.nexusmods.com/skyrimspecialedition/mods/32444]Address Library for SKSE Plugins[/url]\xfeff\n<br />[*]Visual C++ Redistributable 2019[/list]\n<br />\n<br />[color=#A4B7FF][size=5][font=Bebas_Neuebook]Source[/font][/size][/color]\n<br />[list][*][url=https://github.com/KernalsEgg/NetScriptFramework]Scrambled Bugs[/url]\n<br />[*][url=https://github.com/KernalsEgg/ScrambledEggchantments]Scrambled Eggchantments[/url][/list]\n<br />\n<br />[color=#A4B7FF][size=5][font=Bebas_Neuebook]Credits[/font][/size][/color]\n<br />[list][*][url=https://www.nexusmods.com/skyrimspecialedition/mods/21294].NET Script Framework[/url]\n<br />[*][url=https://github.com/Ryan-rsm-McKenzie/CommonLibSSE]CommonLibSSE[/url]\xfeff[/list]\n<br />\n<br />[color=#A4B7FF][size=5][font=Bebas_Neuebook]Inspirations[/font][/size][/color]\n<br />[b]Fixes[/b]\n<br />[list][*][b]Mod Armor Weight Perk Entry Point[/b]\n<br />Based on the Steed Stone fix available in [url=https://www.nexusmods.com/skyrim/mods/96734]Cobb Bug Fixes[/url]\xfeff for Skyrim LE.\n<br />[*][b]Training Menu Text[/b]\n<br />Based on the Trainer Cost UI fix available in [url=https://www.nexusmods.com/skyrim/mods/96734]Cobb Bug Fixes[/url]\xfeff for Skyrim LE.[/list]\n<br />[b]Patches[/b]\n<br />[list][*][b]Equip Best Ammo[/b]\n<br />Based on [url=https://www.nexusmods.com/skyrim/mods/88347]Equip Best Ammo[/url]\xfeff for Skyrim LE.[/list]\n<br />\n<br />[color=#A4B7FF][size=5][font=Bebas_Neuebook]Honorable Mentions[/font][/size][/color]\n<br />[b]Fixes[/b]\n<br />[list][*][b]Actor Value Percentage[/b]\n<br />Addresses the same bug as [url=https://github.com/Exit-9B/Enemy-Health-HUD]Enemy Health HUD[/url] by [url=https://www.nexusmods.com/skyrimspecialedition/users/39501725]Parapets[/url][/list]"
