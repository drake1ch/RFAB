;Ремесленное сырье
Рулон Бумаги = Обычный материал для начертания свитков.
Уголь = Обычный материал для начертания свитков.
Кожа = Обычный кузнечный материал для создания кожаной и сыромятной брони.
Полоски кожи = Обычный кузнечный материал, используется для создания доспехов и оружия.
Слиток железа = Простой кузнечный материал для создания железной брони и оружия.
Слиток корунда = Простой кузнечный материал для создания укреплённой железной и ламеллярной брони.
Слиток стали = Обычный кузнечный материал для создания стальной брони и оружия.
Слиток ртути = Обычный материал для создания эльфийского и нордского снаряжения.
Слиток серебра = Редкий кузнечный материал для создания серебрянного оружия и доспехов.\nОружие наносит на <25%> больше урона нежити.
Слиток двемерского металла = Редкий кузнечный материал для создания гномьего оружия и доспехов.
Слиток орихалка = Редкий кузнечный материал для создания орочьего оружия и доспехов.
Слиток малахита = Редкий кузнечный материал для создания стеклянного оружия и доспехов.
Слиток очищенного лунного камня = Редкий кузнечный материал для создания эльфийского и стеклянного снаряжения.
Слиток золота = Очень редкий материал, символ богатства и роскоши, прекрасно подходит для ювелирных изделий.
Слиток эбонита = Невероятно редкий кузнечный материал для создания эбонитового и даэдрического снаряжения.
Руда сталгрима = Уникальный магический лёд, используется в кузнечном деле для создания сталгримовых оружия и брони.\nКаждая часть доспеха увеличивает на <5%> сопротивление магии.\nОружие наносит <20> ед. урона пронзающим холодом в течение <5> секунд.
;
Драконья кость = Материал, который может быть использован только истинными мастерами кузнечного искусства.\nКаждая часть доспеха на <5%> уменьшает физический урон от драконов.\nОружие наносит на <25%> больше урона драконам.\nСтрелы и болты игнорируют сопротивление дальнему бою у драконов.
Драконья чешуя = Материал, который может быть использован только истинными мастерами кузнечного искусства. \nКаждая часть доспеха на <5%> уменьшает физический урон от драконов.
;
Руда железа = Простое сырье для выплавки железных слитков.\nИспользуется в кузнечном деле.
Руда корунда = Простое сырье для выплавки корундовых слитков.\nИспользуется в кузнечном деле.
Руда ртути = Обычное сырье для выплавки ртутных слитков.\nИспользуется в кузнечном деле.
Руда серебра = Редкое сырье для выплавки серебрянных слитков.\nИспользуется в кузнечном деле.
Руда орихалка = Редкое сырье для выплавки орихалковых слитков.\nИспользуется в кузнечном деле.
Руда малахита = Редкое сырье для выплавки малахитовых слитков.\nИспользуется в кузнечном деле.
Руда очищенного лунного камня = Редкое сырье для выплавки лунного камня.\nИспользуется в кузнечном деле.
Руда золота = Очень редкое сырье для выплавки золотых слитков.\nИспользуется в кузнечном деле.
Руда эбонита = Невероятно редкое сырье для выплавки эбонитовых слитков.\nИспользуется в кузнечном деле.
