[General]
bLogUserEvent = false
bToggleUserEventInputTrace = true
bToggleEventIDInputTrace = true
bToggleMovementInputTrace = true

;print user events in console
[MovementInputTrace]
#enable key trace only when TDM's target lock is active
bTraceOnlyWhenTargetLock = false
#TDM's target lock magic effect formID. DO NOT CHANGE this line if you don't know what you're doing.
TDM_TargetLockMGEF = 0x000804|TrueDirectionalMovement.esp

#split thumbstick input zone into 8 zones where diagonal zones trigger two spells simultaneously.
bThumbStickOctodirecitonalTrace = false

#spells whose magic effects will be added to the player when corresponding movement directions are input.
spell_forward = 0X0CF192|RFAB.esp 

spell_backward = 0X0CF194|RFAB.esp 

spell_left = 0X0CF193|RFAB.esp 

spell_right = 0X0CF195|RFAB.esp 
