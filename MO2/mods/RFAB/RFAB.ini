[General]
sIntroSequence=0		; пропуск лого bethesda в начале игры
bAlwaysActive=false		; будет ли игра оставаться активной в фоновом режиме (в alt + tab)
fAutoDoorFadeSecs=0.0001	;это всё для отключения затемнения при переходе из локи в локу (Хз что это и как работает эффекта от изменения значений не заметил)
fFastTravelFadeSecs=0.0001	;это всё для отключения затемнения при переходе из локи в локу (Затемнение экрана при фасттревеле)
fLoadGameFadeSecs=0.000001	;это всё для отключения затемнения при переходе из локи в локу (Хз)
fNormalDoorFadeSecs=0.00001	;это всё для отключения затемнения при переходе из локи в локу (Время затемнения экрана при переходе в другую локацию)
fNormalDoorFadeWait=0.000001	;это всё для отключения затемнения при переходе из локи в локу (Скорее всего это время ожидания до затемнения)

[Interface]
bShowTutorials=0		; показ подсказок при старте новой игры
fBookOpenTime=400.0000		; скорость анимации открытия книг (слишком маленькие значения могут вызывать баги)
fFadeToBlackFadeSeconds=0.750	;это всё для отключения затемнения при переходе из локи в локу (Время ожидания после затемнения, именно эта херня, судя по всему и отвечает за то, что гг не может двигаться)
fMinSecondsForLoadFadeIn=0.0001	;это всё для отключения затемнения при переходе из локи в локу (Время затемнения после загрузки сейва)
fSleepFaderTime=0.0001	;это всё для отключения затемнения при переходе из локи в локу (Время ожидания затемнения при использовании кровати)

[Papyrus]
fPostLoadUpdateTimeMS=500.0	; уменьшение/увеличение скорости загрузки скриптов (хз на что влияет, но вроде надо 500)
bEnableLogging=0		; включает/отключает запись журналов Papyrus на диск
bEnableTrace=0			; переключает трассировку скрипта, отображение команд трассировки не будут отображаться в игре (хз что это, но говорят лучше не включать)
bLoadDebugInformation=0		; дополнительная информация отладки, лучше не включать, увеличивает потребление памяти

[Launcher]
bEnableFileSelection=1		; нужно для стандартного порядка загрузки esp. должно быть 1 чтобы всё работало как надо 

[MapMenu]
fMapTransitionSpeed=0.250       ; Убирает затемнение при открытии карты

[Controls]
fControllerBufferDepth=0.01     ; Фикс задержки от 3-го лица

